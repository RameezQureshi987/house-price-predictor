services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: house-price-predictor-fastapi:dev
    ports:
      - "8000:8000"

  streamlit:
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    image: house-price-predictor-streamlit:dev
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://fastapi:8000
    depends_on:
      - fastapi
